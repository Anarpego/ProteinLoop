services:
  gemma-vllm:
    image: vllm/vllm-openai-rocm:gemma4
    profiles:
      - amd-gemma
    network_mode: host
    ipc: host
    privileged: true
    cap_add:
      - CAP_SYS_ADMIN
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    group_add:
      - video
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    shm_size: 16g
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    command:
      - --model
      - ${VLLM_MODEL:-google/gemma-4-E2B-it}
      - --host
      - 0.0.0.0
      - --port
      - ${VLLM_PORT:-8001}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-32768}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.90}
      - --limit-mm-per-prompt
      - '{"image":0,"audio":0}'
