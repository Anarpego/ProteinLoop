services:
  simulator:
    build: .
    restart: unless-stopped
    expose:
      - "8000"

  gemma:
    profiles: ["gemma-cpu"]
    build:
      context: .
      dockerfile: deploy/gemma-cpu.Dockerfile
    restart: unless-stopped
    command:
      - --model
      - /models/gemma-4-E2B_q4_0-it.gguf
      - --alias
      - google/gemma-4-E2B-it
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --ctx-size
      - ${GEMMA_CONTEXT_SIZE:-4096}
      - --parallel
      - ${GEMMA_PARALLEL:-1}
      - --batch-size
      - ${GEMMA_BATCH_SIZE:-512}
      - --ubatch-size
      - ${GEMMA_UBATCH_SIZE:-256}
      - --cache-type-k
      - q8_0
      - --cache-type-v
      - q8_0
      - --threads
      - ${GEMMA_THREADS:-3}
      - --threads-batch
      - ${GEMMA_THREADS:-3}
      - --n-gpu-layers
      - "0"
      - --jinja
      - --reasoning
      - "off"
      - --reasoning-budget
      - "0"
    expose:
      - "8001"
    volumes:
      - ${GEMMA_MODEL_DIR:-/opt/proteinloop/models}:/models:ro
    mem_limit: 5g
    cpus: "3.0"
    pids_limit: 256
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  web:
    build:
      context: ./app
    depends_on:
      - simulator
    restart: unless-stopped
    environment:
      PHX_SERVER: "true"
      PHX_HOST: ${PHX_HOST:?set PHX_HOST to the public hostname}
      PORT: "4000"
      SIMULATOR_URL: "http://simulator:8000"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?set SECRET_KEY_BASE}
      GEMMA_ENDPOINT: ${GEMMA_ENDPOINT:-}
      GEMMA_MODEL: ${GEMMA_MODEL:-google/gemma-4-E2B-it}
      GEMMA_API_KEY: ${GEMMA_API_KEY:-}
      GEMMA_RECEIVE_TIMEOUT_MS: ${GEMMA_RECEIVE_TIMEOUT_MS:-120000}
      GEMMA_MAX_TOKENS: ${GEMMA_MAX_TOKENS:-1024}
      NRF9151_EVIDENCE_PATH: "/evidence/nrf9151-live-evidence.json"
    ports:
      - "${PUBLIC_BIND_IP:-0.0.0.0}:${PUBLIC_PORT:-80}:4000"
    volumes:
      - proteinloop_traces:/app/priv/traces
      - ./submission:/evidence:ro

volumes:
  proteinloop_traces:
